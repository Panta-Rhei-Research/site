name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Validate edge headers Worker
        run: |
          npm run headers:test
          npm run headers:dry-run

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Check v2 shell migration
        run: npm run qa:v2-shell

      - name: Build Pagefind search index
        run: npm exec -- pagefind --site _site --output-subdir pagefind

      # ── Smoke-test the built artifact ──────────────────────
      # Validates _site/ has every expected asset, body marker,
      # and anti-regression string BEFORE it's uploaded/deployed.
      # No CDN involvement — runs against local files in ~2s.
      # Fails the build visibly if anything regressed.
      - name: Smoke-test build artifact
        run: |
          chmod +x .github/scripts/smoke-test.sh
          .github/scripts/smoke-test.sh _site

      # ── Dead-link audit (DISABLED 2026-05-01) ──────────────
      # The html-proofer dead-link audit ran ~90s on the full
      # ~7,400-page site and added 1.5–2 minutes to every PR's
      # critical path on top of the Jekyll build (often blocked
      # behind the `concurrency: pages` queue). It was removed
      # to keep PR turnaround fast during the v3 sprint cadence.
      #
      # The script lives at .github/scripts/link-check.sh and
      # can be re-enabled by uncommenting the block below or
      # invoking it manually against a local _site/ via
      # `.github/scripts/link-check.sh _site`. A periodic
      # standalone link-audit workflow is the right replacement
      # if dead-link regression coverage is needed.
      #
      # - name: Dead-link audit
      #   run: |
      #     chmod +x .github/scripts/link-check.sh
      #     .github/scripts/link-check.sh _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
