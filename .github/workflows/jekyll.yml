name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Build Pagefind search index
        run: npm exec -- pagefind --site _site --output-subdir pagefind

      # ── Smoke-test the built artifact ──────────────────────
      # Validates _site/ has every expected asset, body marker,
      # and anti-regression string BEFORE it's uploaded/deployed.
      # No CDN involvement — runs against local files in ~2s.
      # Fails the build visibly if anything regressed.
      - name: Smoke-test build artifact
        run: |
          chmod +x .github/scripts/smoke-test.sh
          .github/scripts/smoke-test.sh _site

      # ── Dead-link audit (html-proofer, internal-only) ──────
      # Catches broken internal links in the built HTML. Each
      # currently-known stale link is listed in the script's
      # IGNORE_URLS; CI fails when a NEW broken link appears.
      # Runs in ~90s against the full 7,400-page site.
      - name: Dead-link audit
        run: |
          chmod +x .github/scripts/link-check.sh
          .github/scripts/link-check.sh _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
