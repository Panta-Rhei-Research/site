<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.summary_short %}
  <meta name="description" content="{{ page.summary_short | strip_html | normalize_whitespace | escape }}">
  <meta property="og:description" content="{{ page.summary_short | strip_html | normalize_whitespace | escape }}">
  {% endif %}
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
  <link rel="canonical" href="{{ page.redirect_to | absolute_url }}">
  <title>{{ page.title | default: "Redirecting" }} | {{ site.title }}</title>
  <script>window.location.replace("{{ page.redirect_to | relative_url }}");</script>
</head>
<body>
  <main>
    <h1>{{ page.title | default: "Redirecting" }}</h1>
    {% if page.summary_short %}
    <p>{{ page.summary_short }}</p>
    {% endif %}
  </main>
  <p>Redirecting to <a href="{{ page.redirect_to | relative_url }}">{{ page.redirect_to }}</a>.</p>
</body>
</html>
