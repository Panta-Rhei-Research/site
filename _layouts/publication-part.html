---
layout: default
---

{% include breadcrumb-nav.html %}

<article class="part-article">
<header class="hero-card">
  <span class="eyebrow">Book {{ page.book_id }} · {{ page.part_display }}</span>
  <h1>{{ page.title }}</h1>
  {% if page.summary_short %}
  <p>{{ page.summary_short | truncate: 200 }}</p>
  {% endif %}
  <div class="btn-group">
    <a href="{{ page.canonical_book_url | relative_url }}" class="btn-secondary">Book {{ page.book_id }}</a>
  </div>
</header>

<section class="content-card">
  <div class="prose">
    {{ content }}
  </div>
</section>
</article>
