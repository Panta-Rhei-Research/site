<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  {% include header.html %}

  <div class="page-grid">
    {% include left-rail.html %}

    <main class="main-content" id="main-content">
      {{ content }}
    </main>

    {% include right-rail.html %}
  </div>

  {% include footer.html %}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Auto-generate TOC from H2 elements
      var toc = document.getElementById('toc');
      if (!toc) return;
      // Find headings in ALL content areas (prose, content-card, main-content)
      var headings = document.querySelectorAll('.prose h2, .content-card h2, .main-content h2');
      var tocLinks = [];
      headings.forEach(function(h) {
        if (!h.id) h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.className = 'toc-link';
        a.textContent = h.textContent;
        toc.appendChild(a);
        tocLinks.push({ el: h, link: a });
      });

      // Hide TOC container if no headings found
      if (tocLinks.length === 0) {
        var tocTitle = toc.previousElementSibling;
        if (tocTitle && tocTitle.classList.contains('toc-title')) tocTitle.style.display = 'none';
        toc.style.display = 'none';
        return;
      }
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            tocLinks.forEach(function(t) { t.link.classList.remove('active'); });
            var match = tocLinks.find(function(t) { return t.el === entry.target; });
            if (match) match.link.classList.add('active');
          }
        });
      }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });

      tocLinks.forEach(function(t) { observer.observe(t.el); });
    });
  </script>

</body>
</html>
