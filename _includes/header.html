<header class="site-header">
  <a href="{{ '/' | relative_url }}" class="header-brand">
    <span class="brand-mark" aria-hidden="true"><span class="glyph-pi">π</span><span class="glyph-rho">ρ</span></span>
    <span class="brand-stack">
      <span class="brand-title">Panta Rhei Research</span>
      <span class="brand-sub">Independent open research program</span>
    </span>
  </a>

  <!-- Mobile + desktop header controls (order: search → TOC → hamburger) -->
  <div class="header-controls">
    <!-- Search button (always visible — 1-tap access) -->
    <button class="header-search" aria-label="Search (press / or Ctrl+K)" type="button" onclick="openSearch()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="5"/>
        <line x1="10" y1="10" x2="14.5" y2="14.5"/>
      </svg>
    </button>

    <!-- TOC dropdown (shown by JS only when page has h2 headings) -->
    <div class="header-toc-wrapper" id="header-toc-wrapper" hidden>
      <button class="header-toc-btn" aria-label="On this page" aria-expanded="false" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <line x1="6" y1="4" x2="15" y2="4"/>
          <line x1="6" y1="9" x2="15" y2="9"/>
          <line x1="6" y1="14" x2="15" y2="14"/>
          <circle cx="3" cy="4" r="1" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="14" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <svg class="header-toc-chevron" width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="4 6 8 10 12 6"/></svg>
      </button>
      <div class="header-toc-dropdown" id="header-toc-dropdown" hidden>
        <!-- Populated by JS from right-rail TOC -->
      </div>
    </div>

    <!-- Hamburger (mobile only) -->
    <button class="header-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-nav" type="button">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>
  </div>

  <!-- Navigation drawer (desktop: inline links / mobile: slide-out mega-menu) -->
  <nav class="header-nav" id="mobile-nav" aria-label="Main">
    {% for item in site.data.nav.header %}
    <a href="{{ item.url | relative_url }}" class="header-nav-link{% if page.url contains item.match %} active{% endif %}">{{ item.title }}</a>
    {% endfor %}

    <!-- Mega-menu section navigation (populated by JS on mobile) -->
    <div class="mega-section-nav" id="mega-section-nav" aria-label="Section navigation"></div>

    <!-- Social links (visible in mobile drawer only) -->
    <div class="drawer-social" aria-label="Social">
      <a href="https://github.com/Panta-Rhei-Research" target="_blank" rel="noopener" aria-label="GitHub" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
      <a href="https://www.linkedin.com/company/panta-rhei-research" target="_blank" rel="noopener" aria-label="LinkedIn" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
    </div>
  </nav>
</header>
