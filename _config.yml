title: "Panta Rhei Research Program"
description: "Public research observatory for the Panta Rhei framework — mathematics, physics, life, and metaphysics from one coherence kernel."
url: "https://panta-rhei.site"
baseurl: ""

# Social / SEO metadata
image: /assets/og-image.png
author:
  name: "Thorsten Fuchs & Anna-Sophie Fuchs"
social:
  name: "Panta Rhei Research Program"
  links:
    - "https://github.com/Panta-Rhei-Research/taulib"

# Search Console verification tokens
# - Bing: already embedded in _includes/head.html (msvalidate.01)
# - Google: populate this key with the token from Google Search Console when registered
# - Yandex: populate this key if registering with Yandex Webmaster
google_site_verification: ""
yandex_verification: ""

permalink: pretty

# Buttondown newsletter integration
buttondown:
  username: "pantarhei"
  form_action: "https://buttondown.com/api/emails/embed-subscribe/pantarhei"
  default_tag: "research-notes"
  heading: "Receive Research Notes"
  body: "Get new Panta Rhei Research Notes by email. Notes are published irregularly and only when there is something substantial to say."
  privacy_note: "Subscription is handled by Buttondown with confirmation by email (double opt-in). You can unsubscribe at any time."
  button_label: "Subscribe"

collections:
  framework:
    output: true
    permalink: /framework/:name/
  taulib_docs:
    output: true
  bibliography:
    output: true
    permalink: /bibliography/:name/
  research_notes:
    output: true
    permalink: /publications/research-notes/:name/
    sort_by: date
  changelog:
    output: true
    permalink: /changelog/:name/
    sort_by: date
  predictions:
    output: true
    permalink: /predictions/:name/
  falsifications:
    output: true
    permalink: /falsifications/:name/
  problem_ledger:
    output: true
    permalink: /program/research-agenda/problem-ledger/:path/

collections_dir: .

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-sitemap

include:
  - _headers

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - specs
  - scripts
  - README.md
  - .DS_Store

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "research-program"
    values:
      layout: "program-doc"
      lane: "research-program"
  - scope:
      type: "framework"
    values:
      layout: "framework-module"
      lane: "framework"
  - scope:
      type: "bibliography"
    values:
      layout: "bibliography-entry"
      lane: "bibliography"
  - scope:
      type: "research_notes"
    values:
      layout: "research-note"
      lane: "publications"
      v2_lane: "publications"
  - scope:
      type: "changelog"
    values:
      layout: "changelog-entry"
      lane: "utility"
  - scope:
      type: "predictions"
    values:
      layout: "prediction-page"
      lane: "results"
  - scope:
      type: "falsifications"
    values:
      layout: "falsification-page"
      lane: "results"
  - scope:
      type: "problem_ledger"
    values:
      layout: "problem-ledger-item"
      lane: "program"
      v2_lane: "program"
