title: "Panta Rhei Research Program"
description: "Public research observatory for the Panta Rhei framework — mathematics, physics, life, and metaphysics from one coherence kernel."
url: "https://panta-rhei.site"
baseurl: ""

permalink: pretty

# Buttondown newsletter integration
buttondown:
  username: "pantarhei"
  form_action: "https://buttondown.com/api/emails/embed-subscribe/pantarhei"
  default_tag: "research-notes"
  heading: "Receive Research Notes"
  body: "Get new Panta Rhei Research Notes by email. Notes are published irregularly and only when there is something substantial to say."
  privacy_note: "Subscription is handled by Buttondown with confirmation by email (double opt-in). You can unsubscribe at any time."
  button_label: "Subscribe"

collections:
  framework:
    output: true
    permalink: /framework/:name/
  taulib_docs:
    output: true
  bibliography:
    output: true
    permalink: /bibliography/:name/
  research_notes:
    output: true
    permalink: /research-notes/:name/
    sort_by: date
  changelog:
    output: true
    permalink: /changelog/:name/
    sort_by: date

collections_dir: .

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - specs
  - scripts
  - README.md
  - .DS_Store

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "research-program"
    values:
      layout: "program-doc"
      lane: "research-program"
  - scope:
      type: "framework"
    values:
      layout: "framework-module"
      lane: "framework"
  - scope:
      type: "bibliography"
    values:
      layout: "bibliography-entry"
      lane: "bibliography"
  - scope:
      type: "research_notes"
    values:
      layout: "research-note"
      lane: "engage"
  - scope:
      type: "changelog"
    values:
      layout: "changelog-entry"
      lane: "utility"
