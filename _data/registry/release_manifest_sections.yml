  'Build status — summary': |
    ## Build status — summary

    | Metric | Value |
    |--------|------:|
    | Total modules | **445** |
    | Total lines | 127,440 |
    | Theorems + lemmas | 4,332 |
    | Definitions | 3,542 |
    | Structures + types | 1,685 |
