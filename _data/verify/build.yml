# It is surfaced on /verify/taulib/status/ and in the taulib-doc layout footer
# so readers can trace generated TauLib projection pages to an exact revision.
#
# Populate with: gh api repos/Panta-Rhei-Research/taulib/commits/main --jq .sha
# and by reading lake-manifest.json for the mathlib rev.

taulib:
