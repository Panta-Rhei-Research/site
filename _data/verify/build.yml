  commit_sha: "85028a69f0ea"
  commit_short: "85028a6"
  policy: "Tactics only (simp, omega, ring, aesop, decide). NEVER imports Mathlib mathematical content."

generated_docs:
  source_commit: "181a59e1bb7099c5ae49cb4c3aa027a9e76f98a5"
  generator_scripts:
    - "scripts/import_taulib_docs.py"
    - "scripts/convert_taulib_html_to_md.py"
