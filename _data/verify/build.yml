  branch: "main"
  commit_sha: "cb5e83015b54dd72eba560953fe2461820078757"
  commit_short: "cb5e830"
  commit_date: "2026-04-29"
  license: "Apache-2.0"
  license_url: "https://github.com/Panta-Rhei-Research/taulib/blob/main/LICENSE"
