# Hand-crafted editorial overrides for cited bibliography entries.
#
# Each key corresponds to a .bib entry in references.bib. When the bibliography
# build script finds a key here, the `why_included` field is rendered in place
# of the automated template text. This allows meticulous, per-item editorial
# prose grounded in how the program actually cites each reference.
#
# Format (YAML):
#   <bib_key>:
#     why_included: |
#       Editorial prose, 2-4 sentences, naming the specific book(s) and
#       chapter(s) where the reference is cited. Should read as interpretive
#       editorial commentary, not a boilerplate template.
#
# All 210 cited-entry keys (from _data/bibliography/citation_index.json)
# should have an entry here before the bibliography is regenerated. Orphan
# entries (the remaining ~915 that are not cited in any book .tex file) will
# receive the editorial orphan template generated by build_bibliography.py.

# Example entries (illustrative — will be replaced with real editorial prose
# for all 210 cited entries in Commit 2).

MacLane1998:
  why_included: |
    Saunders Mac Lane's *Categories for the Working Mathematician* is the
    canonical graduate-level treatment of category theory and serves as the
    standing technical reference for the program's categorical vocabulary.
    Cited across Book I's Part 18 (on self-hosting and internal semantic
    closure) and Book VII's Part 7 (on Lawvere–Tierney topologies) for its
    foundational treatment of topos theory and the categorical apparatus that
    the framework extends.
