- id: plate-12-self-enrichment-not-reduction
  title: Self-Enrichment, Not Reduction
  status: published
  image: /assets/images/plates/plate-12-self-enrichment-not-reduction-hero.webp
  hero_jpg: /assets/images/plates/plate-12-self-enrichment-not-reduction-hero.jpg
  master: /assets/images/plates/plate-12-self-enrichment-not-reduction-master.jpg
