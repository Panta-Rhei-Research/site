  pages:
    - /impact/foundational-science/
    - /program/research-agenda/kernel-model-reality/
  caption: >
    Self-enrichment explains how a later layer can be generated from a prior
    construction while carrying new relational grammar that was not expressible
    at the ground level. The unity of knowledge does not require flattening
    knowledge.
  alt: >
    Scientific plate titled Self-Enrichment, Not Reduction, comparing reduction,
    self-enrichment, and dualism, with self-enrichment shown as a generated layer
    carrying new relational grammar without adding a second world.
