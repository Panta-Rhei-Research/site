    - /discover/
  caption: >
    The Panta Rhei website is structured as a public research observatory:
    Research Agenda states the obligations, Corpus carries the construction,
    Results reports current consequences, Verify exposes inspection routes,
    Publications holds stable artifacts, Impact maps conditional implications,
    and Engage invites structured scrutiny without endorsement.
  alt: >
    Scientific plate showing the Panta Rhei Research Program as a public research observatory,
    with a central spine from Research Agenda to Corpus to Results to Verify,
    surrounded by Discover, Program, Publications, Impact, Engage, inspectability surfaces,
    and world readouts for mathematics, physics, life, and metaphysics.
