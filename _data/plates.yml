  caption: >
    The τ-Kernel is the constrained formal core from which the construction begins:
    five generators, one primitive iterator, K0–K6 axiomatic constraints, and
    constructive closure under a no-hidden-runtime / no-hidden-substrate discipline.
  alt: >
    Scientific plate titled The τ-Kernel, showing five generators, one primitive
    iterator, a central τ-Kernel block, K0–K6 axiomatic constraints, constructive
    closure, and boundary notes for no hidden runtime and no hidden substrate.
